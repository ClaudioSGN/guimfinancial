name: Release MSI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install deps
        run: npm ci

      - name: Validate tag version
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref_name }}".TrimStart("v")
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ($tagVersion -ne $packageVersion) {
            throw "Tag version ($tagVersion) does not match package.json version ($packageVersion)"
          }

      - name: Normalize signing key
        shell: pwsh
        run: |
          $cleanKey = "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" -replace '\s', ''
          if ([string]::IsNullOrWhiteSpace($cleanKey)) {
            throw "TAURI_SIGNING_PRIVATE_KEY secret is empty after normalization"
          }
          "TAURI_SIGNING_PRIVATE_KEY=$cleanKey" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build signed MSI
        run: npm run tauri:build
        env:
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Generate latest.json
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $msi = Get-ChildItem "src-tauri/target/release/bundle/msi/*.msi" |
            Where-Object { $_.Name -match "_$version_" } |
            Select-Object -First 1
          if (-not $msi) { throw "MSI not found for version $version" }

          $sigPath = "$($msi.FullName).sig"
          $signature = (Get-Content $sigPath -Raw).Trim()

          $latest = @{
            version = $version
            notes = "GuimFinancial $version"
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $signature
                url = "https://github.com/${{ github.repository }}/releases/latest/download/$($msi.Name)"
              }
            }
          } | ConvertTo-Json -Depth 10

          [System.IO.File]::WriteAllText(
            (Resolve-Path "src-tauri/target/release/bundle/msi").Path + "\latest.json",
            $latest,
            (New-Object System.Text.UTF8Encoding($false))
          )

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
            src-tauri/target/release/bundle/msi/latest.json
